<!DOCTYPE html>
   <html lang="zh-CN">
   <head>
     <meta charset="UTF-8">
     <title>现代 JavaScript 教程</title>
     <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
     <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
     <!-- 引入 Docsify 默认主题，也可以换成其他主题 -->
     <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
   </head>
   <body>
     <div id="app">加载中...</div>
     <script>
       window.$docsify = {
         name: 'JavaScript 教程',
         repo: 'fuckgym/fuckgym.github.io',
         loadSidebar: true, // 开启左侧侧边栏
         subMaxLevel: 3,    // 侧边栏自动提取 Markdown 标题的层级
         auto2top: true,    // 切换页面后自动跳转到顶部
         search: 'auto'     // 开启全局搜索（需要配合搜索插件）
       }
     </script>
     <!-- Docsify 核心脚本 -->
     <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
     <!-- 搜索插件 -->
     <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
     <!-- 代码高亮（默认支持 JS/HTML/CSS，原文档包含较多高阶用法，可按需补充） -->
     <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
   </body>
   </html>
